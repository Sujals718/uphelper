services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: uphelper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: uphelper
      POSTGRES_PASSWORD: uphelper
      POSTGRES_DB: uphelper
    ports:
      - "5432:5432"
    volumes:
      - uphelper_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: uphelper-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - uphelper_redis_data:/data

volumes:
  uphelper_pg_data:
  uphelper_redis_data:
