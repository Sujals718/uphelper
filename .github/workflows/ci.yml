name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: uphelper
          POSTGRES_PASSWORD: uphelper
          POSTGRES_DB: uphelper
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    env:
      DATABASE_URL: "postgresql://uphelper:uphelper@localhost:5432/uphelper?schema=public"
      REDIS_URL: "redis://localhost:6379"
      JWT_ACCESS_SECRET: "ci-access-secret"
      GOOGLE_CLIENT_ID: "ci-placeholder"
      GOOGLE_CLIENT_SECRET: "ci-placeholder"
      GOOGLE_CALLBACK_URL: "http://localhost:4000/auth/google/callback"
      WEB_ORIGIN: "http://localhost:3000"
      API_PORT: "4000"
      NODE_ENV: "test"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build shared-types
        run: npm run build:types

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run migrations
        run: npm run db:deploy

      - name: Lint
        run: npm run lint

      - name: Unit tests (api)
        run: npm run test

      - name: E2E tests (api)
        run: npm run test:e2e
